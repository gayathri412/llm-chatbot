  <rect x="176" y="165" width="160" height="110" rx="25" fill="#0f172a"/>
  <g filter="url(#glow)">
    <circle cx="216" cy="220" r="18" fill="url(#eye)"/>
    <circle cx="296" cy="220" r="18" fill="url(#eye)"/>
  </g>
  <circle cx="212" cy="215" r="6" fill="#fff" opacity="0.9"/>
