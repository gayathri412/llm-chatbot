  <path d="M 236 255 Q 256 270 276 255" stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="248" y="95" width="16" height="40" rx="4" fill="url(#metal)"/>
  <circle cx="256" cy="85" r="12" fill="#3b82f6" filter="url(#glow)"/>
