<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Stylish blue gradient - electric to deep -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="40%" stop-color="#075985"/>
      <stop offset="70%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    
    <!-- Diagonal shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Sleek robot body -->
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="50%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    
    <!-- Neon blue eye -->
    <radialGradient id="eye" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </radialGradient>
    
    <!-- Cool glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Diagonal shine -->
  <rect width="512" height="512" rx="120" fill="url(#shine)"/>
  
  <!-- Decorative gradient circles -->
  <circle cx="60" cy="70" r="40" fill="#38bdf8" opacity="0.15"/>
  <circle cx="460" cy="430" r="60" fill="#0ea5e9" opacity="0.12"/>
  <circle cx="470" cy="90" r="25" fill="#7dd3fc" opacity="0.2"/>
  
  <!-- Robot head -->
  <g filter="url(#shadow)">
    <rect x="161" y="135" width="190" height="170" rx="45" fill="url(#body)"/>
    <!-- Top highlight -->
    <rect x="161" y="135" width="190" height="85" rx="45" fill="#fff" opacity="0.4"/>
    <!-- Edge stroke -->
    <rect x="161" y="135" width="190" height="170" rx="45" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Face screen -->
  <rect x="181" y="170" width="150" height="100" rx="28" fill="#0c4a6e"/>
  <!-- Screen glow -->
  <rect x="181" y="170" width="150" height="50" rx="28" fill="#075985" opacity="0.4"/>
  
  <!-- Eyes -->
  <g filter="url(#glow)">
    <circle cx="221" cy="220" r="16" fill="url(#eye)"/>
    <circle cx="291" cy="220" r="16" fill="url(#eye)"/>
  </g>
  
  <!-- Eye reflections -->
  <circle cx="217" cy="215" r="5" fill="#fff" opacity="0.95"/>
  <circle cx="287" cy="215" r="5" fill="#fff" opacity="0.95"/>
  <circle cx="223" cy="218" r="2" fill="#fff" opacity="1"/>
  <circle cx="293" cy="218" r="2" fill="#fff" opacity="1"/>
  
  <!-- Stylish smile -->
  <path d="M 241 255 Q 256 268 271 255" stroke="#38bdf8" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <rect x="248" y="105" width="16" height="35" rx="3" fill="url(#body)"/>
  <circle cx="256" cy="95" r="10" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="256" cy="95" r="5" fill="#7dd3fc"/>
  
  <!-- Signal arcs -->
  <path d="M 275 95 Q 290 80 290 65" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 285 98 Q 305 80 305 55" stroke="#7dd3fc" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Shoulders -->
  <rect x="201" y="300" width="110" height="40" rx="18" fill="url(#body)" filter="url(#shadow)"/>
  <rect x="211" y="315" width="90" height="4" rx="2" fill="#38bdf8" opacity="0.3"/>
  
  <!-- Stylish text -->
  <text x="256" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="60" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="3" style="text-shadow: 0 2px 10px rgba(0,0,0,0.3)">SNTI</text>
  <text x="256" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#7dd3fc" text-anchor="middle" letter-spacing="6">AI ASSISTANT</text>
  
  <!-- Corner accents -->
  <g stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M 35 60 L 35 35 L 60 35"/>
    <path d="M 452 35 L 477 35 L 477 60"/>
    <path d="M 35 452 L 35 477 L 60 477"/>
    <path d="M 477 452 L 477 477 L 452 477"/>
  </g>
</svg>
