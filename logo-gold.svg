<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Premium gold gradient - multi-tone -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="75%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    
    <!-- 3D gold body gradient -->
    <linearGradient id="gold3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <!-- Chrome shine for top -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#fffbeb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Rich gold eye -->
    <radialGradient id="goldEye" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    
    <!-- Ultra glow filter -->
    <filter id="ultraGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 3D shadow -->
    <filter id="shadow3D">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Pure black background -->
  <rect width="512" height="512" rx="120" fill="#000000"/>
  
  <!-- Decorative gold circles -->
  <circle cx="70" cy="90" r="35" fill="#ffd700" opacity="0.15"/>
  <circle cx="450" cy="420" r="55" fill="#ff8c00" opacity="0.12"/>
  <circle cx="460" cy="80" r="25" fill="#fff8e7" opacity="0.2"/>
  
  <!-- Gold ring accents -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffc107" stroke-width="1.5" opacity="0.2"/>
  
  <!-- Robot head - 3D gold body -->
  <g filter="url(#shadow3D)">
    <rect x="161" y="135" width="190" height="170" rx="45" fill="url(#gold3D)"/>
    <!-- Gold edge highlight -->
    <rect x="161" y="135" width="190" height="170" rx="45" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
    <!-- Chrome shine on top -->
    <rect x="161" y="135" width="190" height="85" rx="45" fill="url(#chrome)"/>
  </g>
  
  <!-- Face screen - black with gold accent -->
  <rect x="181" y="170" width="150" height="100" rx="28" fill="#000000"/>
  <!-- Gold screen border -->
  <rect x="181" y="170" width="150" height="100" rx="28" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Gold glowing eyes with ultra glow -->
  <g filter="url(#ultraGlow)">
    <circle cx="221" cy="220" r="16" fill="url(#goldEye)"/>
    <circle cx="291" cy="220" r="16" fill="url(#goldEye)"/>
  </g>
  
  <!-- Eye reflections - white -->
  <circle cx="217" cy="215" r="6" fill="#ffffff" opacity="0.95"/>
  <circle cx="287" cy="215" r="6" fill="#ffffff" opacity="0.95"/>
  <circle cx="223" cy="218" r="2.5" fill="#ffffff" opacity="1"/>
  <circle cx="293" cy="218" r="2.5" fill="#ffffff" opacity="1"/>
  
  <!-- Stylish gold smile -->
  <path d="M 241 255 Q 256 268 271 255" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#ultraGlow)"/>
  
  <!-- Antenna - 3D gold -->
  <rect x="248" y="105" width="16" height="35" rx="3" fill="url(#gold3D)"/>
  <circle cx="256" cy="95" r="12" fill="url(#gold)" filter="url(#ultraGlow)"/>
  <circle cx="256" cy="95" r="6" fill="#fff8e7"/>
  
  <!-- Signal waves - gold -->
  <path d="M 275 95 Q 290 80 290 65" stroke="#ffd700" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 285 98 Q 305 80 305 55" stroke="#ffc107" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Shoulders - 3D gold -->
  <rect x="201" y="300" width="110" height="40" rx="18" fill="url(#gold3D)" filter="url(#shadow3D)"/>
  <rect x="211" y="315" width="90" height="4" rx="2" fill="#ffd700" opacity="0.5"/>
  
  <!-- Stylish gold gradient text - ENHANCED VISIBILITY -->
  <text x="256" y="395" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="8" filter="url(#ultraGlow)" style="text-shadow: 0 0 30px rgba(251,191,36,0.6), 0 4px 10px rgba(0,0,0,0.5)">SNTI</text>
  
  <!-- White subtitle -->
  <text x="256" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#fff8e7" text-anchor="middle" letter-spacing="8" opacity="0.9">AI MODELS</text>
  
  <!-- Gold corner accents -->
  <g stroke="#ffd700" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 35 60 L 35 35 L 60 35"/>
    <path d="M 452 35 L 477 35 L 477 60"/>
    <path d="M 35 452 L 35 477 L 60 477"/>
    <path d="M 477 452 L 477 477 L 452 477"/>
  </g>
</svg>
