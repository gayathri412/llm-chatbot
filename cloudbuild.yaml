substitutions:
  _REGION: asia-south1
  _SERVICE: snti-ai-assistant

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/snti-ai/${_SERVICE}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/snti-ai/${_SERVICE}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/snti-ai/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,AUTH_PROVIDER=firebase,FIREBASE_PROJECT_ID=$PROJECT_ID,FIREBASE_STORAGE_BUCKET=$PROJECT_ID.appspot.com,RAG_USE_BIGQUERY=true,BIGQUERY_CONTEXT_DATASET=analytics,BIGQUERY_CONTEXT_TABLE=chat_context_docs,SECRET_MANAGER_ENABLED=false,PII_REDACTION_ENABLED=true,AUDIT_PROMPT_PREVIEW_ENABLED=false
      - --set-secrets=FIREBASE_WEB_API_KEY=firebase-web-api-key:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/snti-ai/${_SERVICE}:$COMMIT_SHA
